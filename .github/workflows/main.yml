name: Build adbfs for Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64 make

      - name: Download WinFsp headers
        run: |
          wget https://gitee.com/mirrors/winfsp/raw/master/inc/fuse/fuse.h
          wget https://gitee.com/mirrors/winfsp/raw/master/inc/fuse/fuse_common.h
          wget https://gitee.com/mirrors/winfsp/raw/master/inc/fuse/fuse_opt.h
          mkdir -p /usr/local/include/fuse
          cp fuse.h fuse_common.h fuse_opt.h /usr/local/include/fuse/

      - name: Patch Makefile to remove fuse.pc dependency
        run: |
          sed -i 's/`pkg-config fuse --cflags`/-I\/usr\/local\/include\/fuse/g' Makefile
          sed -i 's/`pkg-config fuse --libs`//g' Makefile

      - name: Compile for Windows
        run: |
          make CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: adbfs-windows
          path: adbfs.exe
