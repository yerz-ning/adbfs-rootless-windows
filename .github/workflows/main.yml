name: Build adbfs for Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64-posix make

      - name: Download WinFsp headers
        run: |
          mkdir -p /usr/local/include/fuse
          wget https://gitee.com/mirrors/winfsp/raw/master/inc/fuse/fuse.h -O /usr/local/include/fuse/fuse.h
          wget https://gitee.com/mirrors/winfsp/raw/master/inc/fuse/fuse_common.h -O /usr/local/include/fuse/fuse_common.h
          wget https://gitee.com/mirrors/winfsp/raw/master/inc/fuse/fuse_opt.h -O /usr/local/include/fuse/fuse_opt.h

      - name: Compile for Windows
        run: |
          g++-mingw-w64-x86-64-posix -c -o adbfs.o adbfs.cpp -Wall -I/usr/local/include/fuse
          g++-mingw-w64-x86-64-posix -o adbfs.exe adbfs.o -lws2_32

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: adbfs-windows
          path: adbfs.exe
