          #include "fuse.h"
          #include "fuse_common.h"
          #include "fuse_opt.h"
          #include "winfsp_fuse.h"

          using namespace std;

          static string adb_command;
          static string mount_point;
          static string temp_dir;
          static bool debug_mode = false;

          string exec_command(const string& cmd) {
              array<char, 4096> buffer;
              string result;
              unique_ptr<FILE, decltype(&_pclose)> pipe(_popen(cmd.c_str(), "r"), _pclose);
              if (!pipe) {
                  throw runtime_error("popen() failed!");
              }
              while (fgets(buffer.data(), buffer.size(), pipe.get()) != nullptr) {
                  result += buffer.data();
              }
              return result;
          }

          static int adb_getattr(const char *path, struct stat *stbuf) {
              memset(stbuf, 0, sizeof(struct stat));
              string cmd = adb_command + " shell ls -ld " + path;
              string output = exec_command(cmd);
              if (output.empty() || output.find("No such file") != string::npos) {
                  return -ENOENT;
              }
              stbuf->st_mode = S_IFREG | 0644;
              stbuf->st_nlink = 1;
              stbuf->st_size = 1024;
              return 0;
          }

          static int adb_readdir(const char *path, void *buf, fuse_fill_dir_t filler, fuse_off_t offset, struct fuse_file_info *fi) {
              string cmd = adb_command + " shell ls " + path;
              string output = exec_command(cmd);
              stringstream ss(output);
              string line;
              filler(buf, ".", NULL, 0);
              filler(buf, "..", NULL, 0);
              while (getline(ss, line)) {
                  if (!line.empty() && line[0] != '.') {
                      filler(buf, line.c_str(), NULL, 0);
                  }
              }
              return 0;
          }

          static int adb_open(const char *path, struct fuse_file_info *fi) {
              string cmd = adb_command + " shell test -f " + path;
              string output = exec_command(cmd);
              if (output.find("Not found") != string::npos) {
                  return -ENOENT;
              }
              return 0;
          }

          static int adb_read(const char *path, char *buf, size_t size, fuse_off_t offset, struct fuse_file_info *fi) {
              string cmd = adb_command + " shell dd if=" + path + " bs=1 count=" + to_string(size) + " skip=" + to_string(offset);
              string output = exec_command(cmd);
              memcpy(buf, output.data(), min(size, output.size()));
              return output.size();
          }

          static int adb_mkdir(const char *path, fuse_mode_t mode) {
              string cmd = adb_command + " shell mkdir -p " + path;
              exec_command(cmd);
              return 0;
          }

          static int adb_truncate(const char *path, fuse_off_t size) {
              string cmd = adb_command + " shell truncate -s " + to_string(size) + " " + path;
              exec_command(cmd);
              return 0;
          }

          static int adb_utimens(const char *path, const struct fuse_timespec tv[2]) {
              return 0;
          }

          static int adb_release(const char *path, struct fuse_file_info *fi) {
              return 0;
          }

          int main(int argc, char *argv[]) {
              if (argc < 2) {
                  cerr << "Usage: " << argv[0] << " <mountpoint>" << endl;
                  return 1;
              }
              mount_point = argv[1];
              adb_command = "adb";
              
              struct fuse_args args = FUSE_ARGS_INIT(argc, argv);
              struct fuse_operations adbfs_oper = {};
              adbfs_oper.getattr = adb_getattr;
              adbfs_oper.readdir = adb_readdir;
              adbfs_oper.open = adb_open;
              adbfs_oper.read = adb_read;
              adbfs_oper.mkdir = adb_mkdir;
              adbfs_oper.truncate = adb_truncate;
              adbfs_oper.utimens = adb_utimens;
              adbfs_oper.release = adb_release;
              
              cout << "Mounting Android device via ADB on " << mount_point << endl;
              return fuse_main(args.argc, args.argv, &adbfs_oper, NULL);
          }
          ENDOFFILE
