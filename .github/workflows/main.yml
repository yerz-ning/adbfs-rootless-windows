name: Build adbfs for Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 make libfuse-dev pkg-config

      - name: Prepare WinFsp headers
        run: |
          sudo apt-get install -y wget unzip
          wget https://github.com/winfsp/winfsp/archive/refs/heads/master.zip
          unzip master.zip
          sudo cp -r winfsp-master/inc/fuse /usr/local/include/
          sudo cp winfsp-master/build/VStudio/winfsp.pc /usr/local/lib/pkgconfig/

      - name: Compile for Windows
        run: |
          PKG_CONFIG_PATH=/usr/local/lib/pkgconfig make CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: adbfs-windows
          path: adbfs.exe
