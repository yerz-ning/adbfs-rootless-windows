          inline char* mkdtemp(char* template_str) {
              char* p = template_str + strlen(template_str) - 6;
              for (int i = 0; i < 999; i++) {
                  sprintf(p, "%06d", i);
                  if (CreateDirectoryA(template_str, NULL)) return template_str;
                  if (GetLastError() != ERROR_ALREADY_EXISTS) break;
              }
              return NULL;
          }
          
          inline ssize_t pread(int fd, void* buf, size_t count, long long offset) {
              long long old = _lseeki64(fd, 0, SEEK_CUR);
              _lseeki64(fd, offset, SEEK_SET);
              ssize_t r = read(fd, buf, count);
              _lseeki64(fd, old, SEEK_SET);
              return r;
          }
          
          inline ssize_t pwrite(int fd, const void* buf, size_t count, long long offset) {
              long long old = _lseeki64(fd, 0, SEEK_CUR);
              _lseeki64(fd, offset, SEEK_SET);
              ssize_t r = write(fd, buf, count);
              _lseeki64(fd, old, SEEK_SET);
              return r;
          }
          
          inline int mknod(const char* path, unsigned short mode, unsigned dev) {
              errno = ENOSYS;
              return -1;
          }
